name: ghanz_ai
description: "GHANZ AI - AI Assistant Android App (ChatGPT + Google Assistant + Gemini)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.0.5
  
  # Networking
  dio: ^5.3.2
  flutter_dotenv: ^5.1.0
  
  # Routing
  go_router: ^12.1.3
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # File & Media
  file_picker: ^6.1.1
  image_picker: ^1.0.5
  camera: ^0.10.5+7
  
  # Chat UI
  flutter_markdown: ^0.6.18
  flutter_highlight: ^0.7.0
  
  # Voice
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.3
  
  # Device Features
  torch_light: ^1.0.0
  android_intent_plus: ^4.0.3
  flutter_local_notifications: ^16.3.2
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  vibration: ^1.8.4
  screen_brightness: ^1.0.0
  
  # Connectivity & QR
  connectivity_plus: ^5.0.2
  mobile_scanner: ^4.0.1
  
  # Storage
  path_provider: ^2.1.1
  path: ^1.9.0
  archive: ^3.4.10
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/

flutter_native_splash:
  color: "#0A0A0F"
  image: assets/icon/splash_logo.png
  android_12:
    color: "#0A0A0F"
    image: assets/icon/splash_logo.png
  fullscreen: true

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  min_sdk_android: 26
name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: 🔍 Cek Struktur Project
        run: |
          echo "=== ISI ROOT ==="
          ls -la
          echo "=== CEK PUBSPEC ==="
          cat pubspec.yaml || echo "pubspec.yaml tidak ditemukan di root!"
          echo "=== CEK LIB ==="
          ls -la lib/ || echo "lib/ tidak ditemukan!"
          echo "=== CEK ANDROID ==="
          ls -la android/ || echo "android/ tidak ditemukan!"
          
      - name: 📦 Install dependencies
        run: flutter pub get
        
      - name: 🛠️ Build APK
        run: flutter build apk --release
        
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/debug/*.apk
            build/app/outputs/apk/release/*.apk

name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
      
      - name: 🔍 Debug - Cek Versi
        run: |
          echo "=== FLUTTER VERSION ==="
          flutter --version
          echo "=== DART VERSION ==="
          dart --version
          
      - name: 🔧 Fix flutter_local_notifications
        run: |
          FILE="/home/runner/.pub-cache/hosted/pub.dev/flutter_local_notifications-16.3.3/android/src/main/java/com/dexterous/flutterlocalnotifications/FlutterLocalNotificationsPlugin.java"
          if [ -f "$FILE" ]; then
            sed -i 's/bigPictureStyle.bigLargeIcon(null);/// bigPictureStyle.bigLargeIcon(null);/g' "$FILE"
            echo "✅ Fixed flutter_local_notifications"
          fi
          
      - name: 📦 Install dependencies
        run: flutter pub get
        
      - name: 🛠️ Build APK
        run: flutter build apk --release
        
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/*.apk

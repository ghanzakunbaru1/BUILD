name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: true
        type: string
      tag:
        description: 'Build tag'
        required: true
        type: string
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
      
      - name: 🔧 Fix pubspec.yaml
        run: |
          # Fix SDK version
          sed -i 's/sdk: ">=.* <.*"/sdk: ">=3.0.0 <4.0.0"/g' pubspec.yaml || true
          # Fix flutter_local_notifications
          sed -i 's/flutter_local_notifications:.*/flutter_local_notifications: ^17.2.1/g' pubspec.yaml || true
          # Fix file_picker
          sed -i 's/file_picker:.*/file_picker: ^8.0.0/g' pubspec.yaml || true
          echo "=== PUBSPEC AFTER FIX ==="
          cat pubspec.yaml
          
      - name: 📦 Install dependencies
        run: flutter pub get
        
      - name: 🔍 Cek struktur
        run: |
          echo "=== ISI ROOT ==="
          ls -la
          echo "=== CEK LIB ==="
          ls -la lib/ || echo "lib/ not found"
          echo "=== CEK ANDROID ==="
          ls -la android/ || echo "android/ not found"
          
      - name: 🛠️ Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release --android-skip-build-dependency-validation
          fi
          
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/debug/*.apk
            build/app/outputs/apk/release/*.apk

name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL of the source code zip'
        required: true
      tag:
        description: 'Release Tag'
        required: true
      build_type:
        description: 'Build Type (release, debug)'
        required: true
        default: 'release'

jobs:
  build:
    name: Build Flutter App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract source code
        run: |
          wget -O source.zip "${{ github.event.inputs.zip_url }}"
          unzip source.zip -d app_source
          rm source.zip

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./app_source
        run: flutter pub get

      - name: Analyze code (Linting)
        working-directory: ./app_source
        # Bagian ini sangat penting karena JS kamu mencari teks [RESULT_ANALYZE] di dalam log
        run: |
          echo "[RESULT_ANALYZE]"
          flutter analyze || true
          echo "[END_RESULT_ANALYZE]"

      - name: Build APK
        working-directory: ./app_source
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            flutter build apk --release
          else
            flutter build apk --debug
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Sesuaikan path ini dengan output build Flutter
          path: app_source/build/app/outputs/flutter-apk/app-release.apk

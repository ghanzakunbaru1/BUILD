name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: true
        type: string
      tag:
        description: 'Build tag'
        required: true
        type: string
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
      
      - name: 🔍 Cek pubspec.yaml
        run: |
          echo "=== ISI PUBSPEC ==="
          cat pubspec.yaml || echo "❌ pubspec.yaml TIDAK DITEMUKAN!"
          echo "=== LIST FILE ==="
          ls -la
          
      - name: 📦 Install dependencies (DETAIL)
        run: |
          flutter pub get 2>&1 | tee pub_get.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ PUB GET GAGAL!"
            cat pub_get.log
            exit 1
          fi
          
      - name: 🛠️ Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release --android-skip-build-dependency-validation
          fi
          
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/debug/*.apk
            build/app/outputs/apk/release/*.apk
